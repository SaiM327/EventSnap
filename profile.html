<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventSnap - Profile</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">
        <img src="images/mainlogo.png" alt="Logo" width="40"/>
        <span>EventSnap</span>
    </div>
    <div class="nav-links">
    <a href="index.html">Albums</a>
     <a href="profile.html" class="nav-profile">
    <div class="logo">
    <img src="images/user.png" alt="Profile" class="nav-icon" width="20">
    Profile
    </div>
  </a>
</div>

</nav> 

  <main class="container">
    <h1 class="page-title">Profile Settings</h1>

    <div class="profile-card">
      <div class="profile-row">
        <div class="profile-left">
          <div class="profile-photo-wrap">
            <img id="profile-preview" class="profile-photo" src="images/user.png" alt="Profile photo"/>
            <button class="photo-edit-btn" id="photo-edit-btn" type="button" aria-label="Upload profile photo">
              <img src="images/camera.png" alt="" class="camera-icon">
            </button>
          </div>
        </div>

        <div class="profile-right">
          <h3 class="section-title">Profile Photo</h3>
          <p class="muted">
            Upload a photo to help others recognize you in event photos
          </p>
          <p class="muted small">
            JPG, PNG or GIF. Max size 5MB
          </p>
        </div>
      </div>

      <div class="form-group">
        <label for="full-name">Full Name</label>
        <input id="full-name" type="text" placeholder="Alex Johnson" />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" placeholder="alex.johnson@email.com" />
      </div>

      <button class="btn-primary btn-wide" id="save-btn" type="button">
        Save Changes
      </button>

      <!-- Hidden input for profile photo -->
      <input type="file" id="profile-file" accept="image/*" style="display:none" />
    </div>
  </main>

  <script>

    const API_BASE = "http://127.0.0.1:8001";

    async function loadProfilePhoto() {
  const res = await fetch(`${API_BASE}/profile`);
  const data = await res.json();
  if (data.photo_url) {
    preview.src = API_BASE + data.photo_url;
  }
}

    // Simple front-end only behavior (no backend yet):
    // 1) pick photo -> preview updates
    // 2) save name/email -> stored in localStorage so it persists on refresh

    const photoEditBtn = document.getElementById("photo-edit-btn");
    const fileInput = document.getElementById("profile-file");
    const preview = document.getElementById("profile-preview");

    const nameInput = document.getElementById("full-name");
    const emailInput = document.getElementById("email");
    const saveBtn = document.getElementById("save-btn");

    // Load saved profile info (frontend-only)
    function loadProfile() {
      const savedName = localStorage.getItem("profile_name");
      const savedEmail = localStorage.getItem("profile_email");
      const savedPhoto = localStorage.getItem("profile_photo_dataurl");

      if (savedName) nameInput.value = savedName;
      if (savedEmail) emailInput.value = savedEmail;
      if (savedPhoto) preview.src = savedPhoto;
    }

    // Open file picker when camera button clicked
    photoEditBtn.addEventListener("click", () => fileInput.click());

    // Preview selected image (frontend-only)
    fileInput.addEventListener("change", async () => {
  const file = fileInput.files[0];
  if (!file) return;

  if (file.size > 5 * 1024 * 1024) {
    alert("File too large. Max 5MB.");
    fileInput.value = "";
    return;
  }

  const formData = new FormData();
  formData.append("photo", file); // must match backend param name: photo

  const res = await fetch(`${API_BASE}/profile/upload`, {
    method: "POST",
    body: formData
  });

  if (!res.ok) {
    alert("Profile upload failed");
    return;
  }

  const data = await res.json();
  preview.src = API_BASE + data.photo_url;  // show saved image
  fileInput.value = "";
});


    // Save name/email (frontend-only)
    saveBtn.addEventListener("click", () => {
      localStorage.setItem("profile_name", nameInput.value.trim());
      localStorage.setItem("profile_email", emailInput.value.trim());
      alert("Saved (locally for now).");
    });

    loadProfilePhoto();
    loadProfile(); // if you still keep name/email in localStorage for now

  </script>

</body>
</html>
