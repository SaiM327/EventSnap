<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventSnap - Profile</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">
        <img src="images/mainlogo.png" alt="Logo" width="40"/>
        <span>EventSnap</span>
    </div>
    <div class="nav-links">
      <a href="index.html">Albums</a>
      <a href="profile.html" class="nav-profile">
        <div class="logo">
          <img src="images/user.png" alt="Profile" class="nav-icon" width="20">
          Profile
        </div>
      </a>
      <a href="#" id="logout-link">Logout</a>
    </div>
  </nav>

  <main class="container">
    <h1 class="page-title">Profile Settings</h1>

    <div class="profile-card">
      <div class="profile-row">
        <div class="profile-left">
          <div class="profile-photo-wrap">
            <img id="profile-preview" class="profile-photo" src="images/user.png" alt="Profile photo"/>
            <button class="photo-edit-btn" id="photo-edit-btn" type="button" aria-label="Upload profile photo">
              <img src="images/camera.png" alt="" class="camera-icon">
            </button>
          </div>
        </div>

        <div class="profile-right">
          <h3 class="section-title">Profile Photo</h3>
          <p class="muted">
            Upload a photo to help others recognize you in event photos
          </p>
          <p class="muted small">
            JPG, PNG or GIF. Max size 5MB
          </p>
        </div>
      </div>

      <div class="form-group">
        <label for="full-name">Full Name</label>
        <input id="full-name" type="text" placeholder="Alex Johnson" />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" placeholder="alex.johnson@email.com" />
      </div>

      <p class="form-error" id="error-msg"></p>

      <button class="btn-primary btn-wide" id="save-btn" type="button">
        Save Changes
      </button>

      <!-- Hidden input for profile photo -->
      <input type="file" id="profile-file" accept="image/*" style="display:none" />
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    requireAuth();

    const photoEditBtn = document.getElementById("photo-edit-btn");
    const fileInput = document.getElementById("profile-file");
    const preview = document.getElementById("profile-preview");
    const nameInput = document.getElementById("full-name");
    const emailInput = document.getElementById("email");
    const saveBtn = document.getElementById("save-btn");
    const errorMsg = document.getElementById("error-msg");

    document.getElementById("logout-link").addEventListener("click", (e) => {
      e.preventDefault();
      logout();
    });

    async function loadProfile() {
      const res = await authFetch("/me");
      const user = await res.json();

      nameInput.value = user.name || "";
      emailInput.value = user.email || "";
      if (user.photo_url) {
        preview.src = API_BASE + user.photo_url;
      }
    }

    photoEditBtn.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", async () => {
      const file = fileInput.files[0];
      if (!file) return;

      if (file.size > 5 * 1024 * 1024) {
        alert("File too large. Max 5MB.");
        fileInput.value = "";
        return;
      }

      const formData = new FormData();
      formData.append("photo", file); // must match backend param name: photo

      const res = await authFetch("/me/photo", {
        method: "POST",
        body: formData
      });

      if (!res.ok) {
        alert("Profile upload failed");
        return;
      }

      const data = await res.json();
      preview.src = API_BASE + data.photo_url;
      fileInput.value = "";

      if (!data.face_found) {
        alert("We couldn't detect a face in that photo. \"Photos with Me\" won't work until you upload a clear photo of your face.");
      }
    });

    saveBtn.addEventListener("click", async () => {
      errorMsg.textContent = "";

      const res = await authFetch("/me", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: nameInput.value.trim(),
          email: emailInput.value.trim()
        })
      });

      const data = await res.json().catch(() => ({}));

      if (!res.ok) {
        errorMsg.textContent = data.detail || "Failed to save changes.";
        return;
      }

      localStorage.setItem("eventsnap_user", JSON.stringify(data));
      alert("Profile saved.");
    });

    loadProfile();
  </script>

</body>
</html>
