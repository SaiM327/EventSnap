<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventSnap - Album</title>
  <link rel="stylesheet" href="styles.css" />
</head>



<body>

   <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">
        <img src="images/mainlogo.png" alt="Logo" width="40"/>
        <span>EventSnap</span>
    </div>
    <div class="nav-links">
  <a href="index.html">Albums</a>
  <a href="profile.html" class="nav-profile">
    <div class="logo">
    <img src="images/user.png" alt="Profile" class="nav-icon" width="20">
    Profile
    </div>
  </a>
</div>

  </nav>
  <!-- MAIN -->
  <main class="container">
    <a href="index.html" class="back-link">← Back to Albums</a>

    <div class="header-row">
      <div class="header-left">
        <h1 class="title">Event 1</h1>
        <div class="count">234 photos</div>
      </div>
      <button class="btn-primary" id="upload-btn">
    <span class="btn-icon" aria-hidden="true">
        <img src="images/upload.png" alt="upload" width="20px"/>
    </span>
    Upload Photos
</button>

<!-- Hidden file input -->
<input type="file" id="file-input" accept="image/*" style="display:none" multiple>

    </div>

 <!-- Pills / Tabs -->
<div class="pills">
  <button class="pill pill-active" data-tab="all" type="button">
    <img src="images/gallery.png" alt="upload" width="20px"/>
    All Photos (24)
  </button>

  <button class="pill" data-tab="me" type="button">
    Photos with Me (16)
  </button>


</div>

    <!-- Photo Grid -->
   <section class="grid" id="photo-grid"></section>


   
  </main>



<!-- JS -->
<script>
  // Pills tab switching (your existing logic)
  const pills = document.querySelectorAll(".pill");
  pills.forEach(pill => {
    pill.addEventListener("click", async () => {
  pills.forEach(p => p.classList.remove("pill-active"));
  pill.classList.add("pill-active");

  let url = `${API_BASE}/event1/photos`;
  if (pill.dataset.tab === "me") {
    url = `${API_BASE}/event1/photos_with_me`;
  }

  const res = await fetch(url);
  const data = await res.json();
  renderGrid(data.photos || []);
});
  });

  const uploadBtn = document.getElementById('upload-btn');
  const fileInput = document.getElementById('file-input');
  const grid = document.getElementById('photo-grid');

  // If your frontend is not served from FastAPI, use:
  // const API_BASE = "http://localhost:8000";
  // If you serve it from the same origin later, leave it "".
  const API_BASE = "http://localhost:8001";

  function renderGrid(photoUrls) {
    grid.innerHTML = "";
    photoUrls.forEach(url => {
      const tile = document.createElement("div");
      tile.className = "tile";

      const img = document.createElement("img");
      img.src = API_BASE + url; // important when API is on different origin
      img.alt = "uploaded photo";

      tile.appendChild(img);
      grid.appendChild(tile);
    });
  }

  async function loadPhotos() {
    const res = await fetch(`${API_BASE}/event1/photos`);
    const data = await res.json();
    renderGrid(data.photos || []);
  }

  uploadBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', async () => {
    const files = fileInput.files;
    if (!files.length) return;

    const formData = new FormData();
    for (let i = 0; i < files.length; i++) {
      formData.append("photos", files[i]); // must match backend param name
    }

    const res = await fetch(`${API_BASE}/event1/upload`, {
      method: "POST",
      body: formData
    });

    if (!res.ok) {
      alert("Upload failed");
      return;
    }

    fileInput.value = "";
    await loadPhotos();
  });

  // Load on page open
  loadPhotos();

  function renderGrid(photoUrls) {
  grid.innerHTML = "";

  photoUrls.forEach(url => {
    const tile = document.createElement("div");
    tile.className = "tile";

    const img = document.createElement("img");
    img.src = API_BASE + url;
    img.alt = "uploaded photo";

    const deleteBtn = document.createElement("button");
    deleteBtn.className = "delete-btn";
    deleteBtn.textContent = "✕";

    deleteBtn.addEventListener("click", async (e) => {
      e.stopPropagation(); // prevent tile click

      const filename = url.split("/").pop();

      const res = await fetch(
        `${API_BASE}/event1/photos/${filename}`,
        { method: "DELETE" }
      );

      if (!res.ok) {
        alert("Failed to delete image");
        return;
      }

      await loadPhotos();
    });

    tile.appendChild(img);
    tile.appendChild(deleteBtn);
    grid.appendChild(tile);
  });
}

</script>

</body>
</html>


</body>
</html>
