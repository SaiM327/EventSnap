<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventSnap - Album</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">
        <img src="images/mainlogo.png" alt="Logo" width="40"/>
        <span>EventSnap</span>
    </div>
    <div class="nav-links">
      <a href="index.html">Albums</a>
      <a href="profile.html" class="nav-profile">
        <div class="logo">
          <img src="images/user.png" alt="Profile" class="nav-icon" width="20">
          Profile
        </div>
      </a>
      <a href="#" id="logout-link">Logout</a>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="container">
    <a href="index.html" class="back-link">← Back to Albums</a>

    <div class="header-row">
      <div class="header-left">
        <h1 class="title" id="event-title">…</h1>
        <div class="count" id="photo-count"></div>
      </div>

      <div class="header-actions">
        <button class="btn-primary" id="upload-btn">
          <span class="btn-icon" aria-hidden="true">
            <img src="images/upload.png" alt="upload" width="20px"/>
          </span>
          Upload Photos
        </button>
        <button class="btn-secondary" id="download-all-btn" type="button">Download All</button>
        <button class="btn-secondary" id="download-me-btn" type="button">Download My Photos</button>
        <button class="btn-danger" id="delete-event-btn" type="button" style="display:none">Delete Event</button>
      </div>

      <!-- Hidden file input -->
      <input type="file" id="file-input" accept="image/*" style="display:none" multiple>
    </div>

    <!-- Pills / Tabs -->
    <div class="pills">
      <button class="pill pill-active" data-tab="all" type="button">
        <img src="images/gallery.png" alt="gallery" width="20px"/>
        <span id="all-count">All Photos</span>
      </button>

      <button class="pill" data-tab="me" type="button">
        <span id="me-count">Photos with Me</span>
      </button>
    </div>

    <p class="muted" id="status-msg" style="display:none"></p>

    <!-- Photo Grid -->
    <section class="grid" id="photo-grid"></section>
  </main>

  <script src="app.js"></script>
  <script>
    requireAuth();

    const eventId = new URLSearchParams(window.location.search).get("id");
    if (!eventId) window.location.href = "index.html";

    const pills = document.querySelectorAll(".pill");
    const uploadBtn = document.getElementById("upload-btn");
    const fileInput = document.getElementById("file-input");
    const grid = document.getElementById("photo-grid");
    const eventTitle = document.getElementById("event-title");
    const photoCount = document.getElementById("photo-count");
    const allCountLabel = document.getElementById("all-count");
    const meCountLabel = document.getElementById("me-count");
    const statusMsg = document.getElementById("status-msg");
    const deleteEventBtn = document.getElementById("delete-event-btn");

    let currentTab = "all";
    let eventName = "event";

    document.getElementById("logout-link").addEventListener("click", (e) => {
      e.preventDefault();
      logout();
    });

    function setStatus(text) {
      statusMsg.textContent = text || "";
      statusMsg.style.display = text ? "" : "none";
    }

    function renderGrid(photos) {
      grid.innerHTML = "";

      photos.forEach(photo => {
        const tile = document.createElement("div");
        tile.className = "tile";

        const img = document.createElement("img");
        img.src = API_BASE + photo.url;
        img.alt = "uploaded photo";

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "delete-btn";
        deleteBtn.textContent = "✕";

        deleteBtn.addEventListener("click", async (e) => {
          e.stopPropagation();

          const res = await authFetch(`/events/${eventId}/photos/${photo.id}`, {
            method: "DELETE"
          });

          if (!res.ok) {
            alert("Failed to delete image");
            return;
          }

          await refresh();
        });

        tile.appendChild(img);
        tile.appendChild(deleteBtn);
        grid.appendChild(tile);
      });
    }

    async function loadEventDetails() {
      const res = await authFetch(`/events/${eventId}`);
      if (!res.ok) {
        window.location.href = "index.html";
        return;
      }
      const ev = await res.json();
      eventName = ev.name;
      eventTitle.textContent = ev.name;
      document.title = `EventSnap - ${ev.name}`;
      photoCount.textContent = `${ev.photo_count} photo${ev.photo_count === 1 ? "" : "s"}`;
      deleteEventBtn.style.display = ev.is_owner ? "" : "none";
    }

    async function loadPhotos() {
      setStatus("");
      const endpoint = currentTab === "me" ? "photos_with_me" : "photos";
      const res = await authFetch(`/events/${eventId}/${endpoint}`);
      const data = await res.json();
      const photos = data.photos || [];

      renderGrid(photos);

      if (currentTab === "me") {
        meCountLabel.textContent = `Photos with Me (${photos.length})`;
        if (data.needs_profile) {
          setStatus("Upload a profile photo on the Profile page so we can find you in event photos.");
        } else if (data.pending > 0) {
          setStatus(`${data.pending} photo${data.pending === 1 ? " is" : "s are"} still being scanned for faces. Check back shortly.`);
        }
      } else {
        allCountLabel.textContent = `All Photos (${photos.length})`;
        photoCount.textContent = `${photos.length} photo${photos.length === 1 ? "" : "s"}`;
      }
    }

    async function refresh() {
      await loadPhotos();
    }

    pills.forEach(pill => {
      pill.addEventListener("click", async () => {
        pills.forEach(p => p.classList.remove("pill-active"));
        pill.classList.add("pill-active");
        currentTab = pill.dataset.tab;
        await loadPhotos();
      });
    });

    uploadBtn.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", async () => {
      const files = fileInput.files;
      if (!files.length) return;

      const formData = new FormData();
      for (let i = 0; i < files.length; i++) {
        formData.append("photos", files[i]); // must match backend param name
      }

      const res = await authFetch(`/events/${eventId}/photos`, {
        method: "POST",
        body: formData
      });

      if (!res.ok) {
        alert("Upload failed");
        return;
      }

      fileInput.value = "";
      await refresh();
    });

    async function downloadZip(scope) {
      const res = await authFetch(`/events/${eventId}/download?scope=${scope}`);
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        alert(data.detail || "Nothing to download");
        return;
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${eventName.replace(/[^a-z0-9]/gi, "_")}_${scope === "me" ? "my_photos" : "all_photos"}.zip`;
      a.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById("download-all-btn").addEventListener("click", () => downloadZip("all"));
    document.getElementById("download-me-btn").addEventListener("click", () => downloadZip("me"));

    deleteEventBtn.addEventListener("click", async () => {
      if (!confirm(`Delete "${eventName}" and all its photos? This cannot be undone.`)) return;

      const res = await authFetch(`/events/${eventId}`, { method: "DELETE" });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        alert(data.detail || "Failed to delete event");
        return;
      }
      window.location.href = "index.html";
    });

    // Load on page open
    loadEventDetails();
    loadPhotos();
  </script>

</body>
</html>
